# Production environment configuration for Render
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.jdbc-url=${SPRING_DATASOURCE_URL}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Disable automatic schema initialization - we'll use Flyway or manual SQL
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=none

# Logging
logging.level.com.example.todo.repository=INFO
logging.level.org.springframework=INFO

# Hidden method filter
spring.mvc.hiddenmethod.filter.enabled=true

# Server port (Render uses PORT environment variable)
server.port=${PORT:8080}
