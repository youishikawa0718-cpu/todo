# Production environment configuration for Render
# Build JDBC URL from individual database properties
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Disable automatic schema initialization - we'll use Flyway or manual SQL
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=none

# Logging (set to DEBUG for troubleshooting)
logging.level.com.example.todo=DEBUG
logging.level.org.springframework=INFO
logging.level.org.springframework.jdbc=DEBUG

# Hidden method filter
spring.mvc.hiddenmethod.filter.enabled=true

# Server port (Render uses PORT environment variable)
server.port=${PORT:10000}
