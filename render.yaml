services:
  - type: web
    name: todo-app
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: todo-db
          property: connectionString
      - key: PORT
        value: 10000
    healthCheckPath: /

databases:
  - name: todo-db
    databaseName: todo
    user: todo_user
    plan: free
